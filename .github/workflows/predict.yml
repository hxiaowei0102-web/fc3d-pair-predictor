name: 福彩3D每日预测

on:
  push:
    branches: [main]
    paths:
      - 'predict_v12.py'
      - 'auto_predict.py'
      - 'build_html.py'
  schedule:
    # 三重备份: 北京时间 22:00 / 23:30 / 次日01:00
    # 3次机会兜底，确保最早获取当晚开奖数据
    - cron: '0 14 * * *'   # UTC 14:00 = 北京 22:00
    - cron: '30 15 * * *'  # UTC 15:30 = 北京 23:30
    - cron: '0 17 * * *'   # UTC 17:00 = 北京 01:00
  workflow_dispatch:  # 手动触发

jobs:
  predict-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install numpy

      - name: 运行预测
        run: python auto_predict.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html prediction_v12.json history.csv predict_v12.py
          git diff --staged --quiet || git commit -m "🤖 自动预测 $(date +%Y%m%d-%H%M)"
          git push

      - name: 部署到GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 发布Pages
        id: deployment
        uses: actions/deploy-pages@v4
